<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — InAmigos Foundation</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav id="navbar" class="scrolled">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <span class="dot" style="background:var(--blue)"></span>
          <span class="dot" style="background:var(--green)"></span>
          <span class="dot" style="background:var(--orange)"></span>
          <span class="dot" style="background:var(--red)"></span>
        </div>
        <span class="logo-text">InAmigos<em>Foundation</em></span>
      </a>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon" style="margin:0 auto 12px; width:36px; height:36px; gap:4px;">
          <span class="dot" style="background:var(--blue); width:16px; height:16px;"></span>
          <span class="dot" style="background:var(--green); width:16px; height:16px;"></span>
          <span class="dot" style="background:var(--orange); width:16px; height:16px;"></span>
          <span class="dot" style="background:var(--red); width:16px; height:16px;"></span>
        </div>
        <div class="logo-text" style="color:var(--navy); justify-content:center; display:flex; font-size:1rem;">
          InAmigos<em>Foundation</em>
        </div>
      </div>

      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your volunteer account</p>

      <div id="loginError" style="display:none; padding:12px 16px; background:#FEF2F2; border:1px solid #FECACA; border-radius:8px; color:#DC2626; font-size:0.88rem; margin-bottom:16px;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required/>
        </div>
        <div style="text-align:right; margin-bottom:20px;">
          <a href="#" style="font-size:0.85rem; color:var(--orange); font-weight:500;">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;" id="loginBtn">
          Sign In
        </button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="signup.html">Create one →</a>
      </div>
      <div style="text-align:center; margin-top:16px;">
        <a href="index.html" style="font-size:0.85rem; color:var(--muted);">← Back to website</a>
      </div>
    </div>
  </section>

  <script src="js/script.js"></script>
  <script>
    // Frontend demo login — replace with real API call to server.js
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      errorEl.style.display = 'none';

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'volunteer.html';
        } else {
          errorEl.textContent = data.message || 'Invalid email or password.';
          errorEl.style.display = 'block';
          btn.textContent = 'Sign In';
          btn.disabled = false;
        }
      } catch {
        errorEl.textContent = 'Unable to connect to server. Please try again.';
        errorEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
